<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Struk Tartaros Store</title>

    <style>
      /* ============= GLOBAL =============  */
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #1e1e2f;
        color: white;
        padding: 15px;
        margin: 0;
      }

      h1 {
        text-align: center;
        color: orange;
        margin-bottom: 20px;
        font-size: 24px;
      }

      .logo-header {
        text-align: center;
        margin-bottom: 20px;
      }

      .logo {
        max-width: 200px;
        height: auto;
        display: inline-block;
      }

      h3 {
        margin-top: 0;
      }

      /* ============= BUTTON GROUP =============  */
      .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
        justify-content: center;
      }

      /* ============= TABLE =============  */
      .table-container {
        overflow-x: auto;
        margin-top: 20px;
        border-radius: 5px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #2a2a40;
        min-width: 500px;
      }

      th,
      td {
        border: 1px solid #444;
        padding: 10px;
        text-align: center;
        font-size: 14px;
      }

      th {
        background: #1a1a2e;
        color: #ffa500;
        font-weight: bold;
      }

      td input[type="number"] {
        width: 60px;
        padding: 6px;
      }

      /* ============= FORM INPUT =============  */
      input {
        padding: 8px;
        border-radius: 5px;
        border: none;
        font-size: 14px;
      }

      /* ============= BUTTON =============  */
      button {
        padding: 10px 15px;
        border-radius: 5px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
        font-size: 14px;
        min-width: 100px;
      }

      .btn-add {
        background: #27ae60;
        color: white;
      }

      .btn-add:hover {
        background: #229954;
      }

      .btn-delete {
        background: #e74c3c;
        color: white;
        padding: 6px 10px;
        font-size: 12px;
        min-width: auto;
      }

      .btn-delete:hover {
        background: #c0392b;
      }

      .btn-edit {
        background: #3498db;
        color: white;
        padding: 6px 10px;
        font-size: 12px;
        min-width: auto;
        margin-right: 0;
      }

      .btn-edit:hover {
        background: #2980b9;
      }

      .btn-print {
        background: #f39c12;
        color: black;
        flex: 1;
        min-width: 120px;
      }

      .btn-print:hover {
        background: #e67e22;
      }

      .btn-confirm {
        background: #27ae60;
        color: white;
        flex: 1;
      }

      .btn-confirm:hover {
        background: #229954;
      }

      .btn-cancel {
        background: #95a5a6;
        color: white;
        flex: 1;
      }

      .btn-cancel:hover {
        background: #7f8c8d;
      }

      /* ============= INFO =============  */
      #total {
        margin-top: 20px;
        font-size: 18px;
        text-align: right;
        font-weight: bold;
        color: #ffa500;
      }

      #warning {
        color: #e74c3c;
        text-align: right;
        margin-top: 10px;
        font-weight: bold;
        font-size: 14px;
      }

      #loading {
        text-align: center;
        padding: 20px;
        color: #ffa500;
        display: none;
      }

      #error-notification {
        background: #c0392b;
        color: white;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
        display: none;
        text-align: center;
        font-size: 14px;
      }

      /* ============= MODAL =============  */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        justify-content: center;
        align-items: center;
        z-index: 1000;
        padding: 20px;
        overflow-y: auto;
      }

      .modal-content {
        background: #2a2a40;
        padding: 25px;
        border-radius: 10px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }

      .modal-content h3 {
        color: #ffa500;
        margin-bottom: 20px;
        margin-top: 0;
      }

      .modal-content input {
        width: 100%;
        margin-bottom: 12px;
        box-sizing: border-box;
        padding: 10px;
      }

      .modal-buttons {
        display: flex;
        gap: 10px;
      }

      .modal-content .modal-buttons button {
        flex: 1;
        margin: 0;
      }

      /* ============= STRUK PREVIEW MODAL =============  */
      .struk-preview-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        justify-content: center;
        align-items: center;
        z-index: 1001;
        padding: 20px;
        overflow-y: auto;
      }

      .struk-preview-content {
        background: white;
        color: black;
        padding: 30px;
        border-radius: 10px;
        width: 100%;
        max-width: 350px;
        font-family: "Courier New", monospace;
        font-size: 13px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }

      .struk-preview-header {
        text-align: center;
        border-bottom: 2px dashed #000;
        padding-bottom: 10px;
        margin-bottom: 15px;
      }

      .struk-preview-header h2 {
        margin: 5px 0;
        font-size: 16px;
        font-weight: bold;
        color: black;
      }

      .struk-preview-header p {
        margin: 3px 0;
        font-size: 11px;
        color: #333;
      }

      .struk-preview-items {
        margin-bottom: 15px;
      }

      .struk-preview-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 5px;
        color: black;
      }

      .struk-preview-item-name {
        flex: 1;
        text-align: left;
        margin-right: 10px;
        word-break: break-word;
      }

      .struk-preview-item-qty {
        text-align: center;
        width: 50px;
        font-size: 11px;
        flex-shrink: 0;
      }

      .struk-preview-item-price {
        text-align: right;
        width: 70px;
        font-size: 11px;
        flex-shrink: 0;
      }

      .struk-preview-footer {
        border-top: 2px dashed #000;
        border-bottom: 2px dashed #000;
        padding: 10px 0;
        margin: 10px 0;
        text-align: right;
      }

      .struk-preview-total {
        font-size: 14px;
        font-weight: bold;
        margin: 15px 0;
        text-align: right;
        color: black;
      }

      .struk-preview-timestamp {
        text-align: center;
        font-size: 10px;
        color: #666;
        margin-top: 15px;
      }

      .struk-preview-buttons {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .struk-preview-buttons button {
        flex: 1;
      }

      /* ============= STRUK SECTION (HIDDEN BY DEFAULT) =============  */
      #struk-section {
        display: none;
      }

      /* ============= RESPONSIVE DESIGN =============  */
      /* Tablet */
      @media (max-width: 768px) {
        body {
          padding: 10px;
        }

        h1 {
          font-size: 20px;
          margin-bottom: 15px;
        }

        .button-group {
          margin-bottom: 15px;
        }

        button {
          padding: 8px 12px;
          font-size: 12px;
          min-width: 80px;
        }

        table {
          font-size: 12px;
        }

        th,
        td {
          padding: 8px 5px;
          font-size: 12px;
        }

        #total,
        #warning {
          font-size: 14px;
        }

        .modal-content {
          width: 90%;
          padding: 20px;
        }

        .struk-preview-content {
          width: 90%;
          padding: 20px;
        }
      }

      /* Mobile */
      @media (max-width: 480px) {
        body {
          padding: 8px;
        }

        h1 {
          font-size: 18px;
          margin-bottom: 12px;
        }

        .button-group {
          flex-direction: column;
          gap: 8px;
        }

        button {
          padding: 8px 10px;
          font-size: 12px;
          min-width: auto;
          width: 100%;
        }

        table {
          font-size: 11px;
          min-width: 100%;
        }

        th,
        td {
          padding: 6px 3px;
          font-size: 11px;
        }

        td input[type="number"] {
          width: 50px;
          padding: 4px;
          font-size: 11px;
        }

        #total,
        #warning {
          font-size: 12px;
        }

        .modal-content {
          width: 95%;
          max-width: 100%;
          padding: 15px;
        }

        .modal-content input {
          padding: 8px;
          font-size: 12px;
        }

        .struk-preview-content {
          width: 95%;
          max-width: 100%;
          padding: 15px;
          font-size: 11px;
        }

        .struk-preview-item-price {
          width: 55px;
        }

        .struk-preview-item-qty {
          width: 45px;
        }

        .struk-preview-item-name {
          margin-right: 5px;
        }
      }

      @media print {
        body {
          background: white;
          color: black;
          padding: 0;
        }

        h1,
        .logo-header,
        .button-group,
        .btn-add,
        .btn-print,
        .table-container,
        table,
        #total,
        #warning,
        .modal,
        .struk-preview-modal {
          display: none !important;
        }

        #struk-section {
          display: block;
          page: auto;
        }

        .struk {
          max-width: 400px;
          margin: 0 auto;
          padding: 0;
          background: white;
          color: black;
          font-family: "Courier New", monospace;
          font-size: 14px;
        }
      }
    </style>
  </head>

  <body>
    <div class="logo-header">
      <img src="gambar/logo.png" alt="Tartaros Store Logo" class="logo">
    </div>

    <div id="error-notification"></div>
    <div id="loading">⏳ Memuat data...</div>

    <div class="button-group">
      <button class="btn-add" onclick="openModal()">+ Tambah Item</button>
      <button class="btn-print" onclick="previewStruk()">
        🖨️ Preview & Print
      </button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Nama</th>
            <th>Harga Paket</th>
            <th>Jumlah Paket</th>
            <th>Total Item</th>
            <th>Total Harga</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div id="total">Total: Rp 0</div>
    <div id="warning"></div>

    <!-- STRUK SECTION (PRINT ONLY) -->
    <div id="struk-section">
      <div class="struk">
        <div class="struk-header">
          <h2>🧾 TARTAROS STORE</h2>
          <p>=====================</p>
          <p id="struk-date"></p>
        </div>

        <div class="struk-items" id="struk-items"></div>

        <div class="struk-footer">
          <div class="struk-total" id="struk-total">Rp 0</div>
        </div>

        <div class="struk-timestamp">
          <p>Terima kasih! 🙏</p>
          <p id="struk-time"></p>
        </div>
      </div>
    </div>

    <!-- MODAL TAMBAH -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <h3>Tambah Item</h3>

        <input id="nama" placeholder="Nama Item" />
        <input id="harga" type="number" placeholder="Harga Paket" />
        <input id="pack" type="number" placeholder="Isi per Paket" />
        <input id="qtyPack" type="number" placeholder="Jumlah Paket" />

        <div class="modal-buttons">
          <button class="btn-confirm" onclick="saveItem()">Simpan</button>
          <button class="btn-cancel" onclick="closeModal()">Batal</button>
        </div>
      </div>
    </div>

    <!-- MODAL EDIT -->
    <div class="modal" id="modal-edit">
      <div class="modal-content">
        <h3>Edit Item</h3>

        <input id="edit-nama" placeholder="Nama Item" />
        <input id="edit-harga" type="number" placeholder="Harga Paket" />
        <input id="edit-pack" type="number" placeholder="Isi per Paket" />

        <div class="modal-buttons">
          <button class="btn-confirm" onclick="updateItem()">Update</button>
          <button class="btn-cancel" onclick="closeEditModal()">Batal</button>
        </div>
      </div>
    </div>

    <!-- MODAL PREVIEW STRUK -->
    <div class="struk-preview-modal" id="struk-preview-modal">
      <div class="struk-preview-content">
        <div class="struk-preview-header">
          <h2>🧾 TARTAROS STORE</h2>
          <p>=====================</p>
          <p id="preview-struk-date"></p>
        </div>

        <div class="struk-preview-items" id="preview-struk-items"></div>

        <div class="struk-preview-footer">
          <div class="struk-preview-total" id="preview-struk-total">Rp 0</div>
        </div>

        <div class="struk-preview-timestamp">
          <p>Terima kasih! 🙏</p>
          <p id="preview-struk-time"></p>
        </div>

        <div class="struk-preview-buttons">
          <button class="btn-confirm" onclick="printFromModal()">
            🖨️ Cetak
          </button>
          <button class="btn-cancel" onclick="closePreviewModal()">
            Tutup
          </button>
        </div>
      </div>
    </div>

    <script>
      // ============= API URL CONFIG =============
      const API_URL = window.location.origin + "/api";

      // ============= DATA =============
      let items = [];
      let itemQty = {};

      // ============= UTILITY FUNCTIONS =============
      function formatRupiah(num) {
        return num.toLocaleString("id-ID");
      }

      // ============= FETCH DATA =============
      async function loadItems() {
        document.getElementById("loading").style.display = "block";
        document.getElementById("error-notification").style.display = "none";

        try {
          const response = await fetch(`${API_URL}/items`);

          if (!response.ok) {
            throw new Error(`Server error: ${response.status}`);
          }

          items = await response.json();

          items.forEach((item) => {
            if (!itemQty[item.id]) {
              itemQty[item.id] = 0;
            }
          });

          document.getElementById("loading").style.display = "none";
          showErrorNotification("");
          render();
        } catch (error) {
          console.error("Error loading items:", error);
          document.getElementById("loading").style.display = "none";
          showErrorNotification("⚠️ Gagal memuat data. Coba refresh halaman.");
        }
      }

      function showErrorNotification(message) {
        const errorDiv = document.getElementById("error-notification");
        if (message) {
          errorDiv.innerText = message;
          errorDiv.style.display = "block";
        } else {
          errorDiv.style.display = "none";
        }
      }

      // ============= RENDER & UPDATE =============
      function render() {
        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";
        let grandTotal = 0;

        items.forEach((item) => {
          const qty = itemQty[item.id] || 0;
          const totalItem = qty * item.pack;
          const totalPrice = qty * item.price;
          grandTotal += totalPrice;

          tbody.innerHTML += `
            <tr>
              <td>${item.name}</td>
              <td>Rp ${formatRupiah(item.price)} / ${item.pack}</td>
              <td>
                <input type="number" value="${qty}" min="0" onchange="updateQty(${item.id}, this.value)" />
              </td>
              <td>${totalItem}</td>
              <td>Rp ${formatRupiah(totalPrice)}</td>
              <td>
                <button class="btn-edit" onclick="openEditModal(${item.id}, '${item.name}', ${item.price}, ${item.pack})">Ubah</button>
                <button class="btn-delete" onclick="deleteItemFromDB(${item.id})">X</button>
              </td>
            </tr>
          `;
        });

        document.getElementById("total").innerText =
          "Total: Rp " + formatRupiah(grandTotal);
        document.getElementById("warning").innerText =
          grandTotal < 10000 ? "⚠ Minimal pembelian Rp 10.000" : "";
      }

      function updateQty(itemId, val) {
        itemQty[itemId] = Math.max(0, parseInt(val) || 0);
        render();
      }

      async function deleteItemFromDB(itemId) {
        if (!confirm("Hapus item ini dari database?")) return;

        try {
          const response = await fetch(`${API_URL}/items/${itemId}`, {
            method: "DELETE",
          });

          if (response.ok) {
            loadItems();
          } else {
            showErrorNotification("❌ Gagal menghapus item");
          }
        } catch (error) {
          console.error("Error deleting item:", error);
          showErrorNotification("❌ Terjadi kesalahan saat menghapus item");
        }
      }

      // ============= MODAL FUNCTIONS =============
      function openModal() {
        document.getElementById("modal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("modal").style.display = "none";
      }

      let editingItemId = null;

      function openEditModal(id, name, price, pack) {
        editingItemId = id;
        document.getElementById("edit-nama").value = name;
        document.getElementById("edit-harga").value = price;
        document.getElementById("edit-pack").value = pack;
        document.getElementById("modal-edit").style.display = "flex";
      }

      function closeEditModal() {
        document.getElementById("modal-edit").style.display = "none";
        editingItemId = null;
      }

      // ============= SAVE & UPDATE =============
      async function saveItem() {
        const name = document.getElementById("nama").value;
        const price = parseInt(document.getElementById("harga").value);
        const pack = parseInt(document.getElementById("pack").value);

        if (!name || isNaN(price) || isNaN(pack) || price <= 0 || pack <= 0) {
          showErrorNotification(
            "⚠️ Isi semua data dengan benar! (Harga dan Isi per Paket harus > 0)",
          );
          return;
        }

        try {
          const response = await fetch(`${API_URL}/items`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ name, price, pack }),
          });

          if (response.ok) {
            closeModal();
            loadItems();
            document.getElementById("nama").value = "";
            document.getElementById("harga").value = "";
            document.getElementById("pack").value = "";
            document.getElementById("qtyPack").value = "";
          } else {
            const error = await response.json();
            showErrorNotification(
              `❌ Gagal menambah item: ${error.error || "Kesalahan tidak diketahui"}`,
            );
          }
        } catch (error) {
          console.error("Error saving item:", error);
          showErrorNotification(`❌ Terjadi kesalahan saat menambah item`);
        }
      }

      async function updateItem() {
        const name = document.getElementById("edit-nama").value;
        const price = parseInt(document.getElementById("edit-harga").value);
        const pack = parseInt(document.getElementById("edit-pack").value);

        if (!name || isNaN(price) || isNaN(pack) || price <= 0 || pack <= 0) {
          showErrorNotification(
            "⚠️ Isi semua data dengan benar! (Harga dan Isi per Paket harus > 0)",
          );
          return;
        }

        try {
          const response = await fetch(`${API_URL}/items/${editingItemId}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ name, price, pack }),
          });

          if (response.ok) {
            closeEditModal();
            loadItems();
          } else {
            const error = await response.json();
            showErrorNotification(
              `❌ Gagal update item: ${error.error || "Kesalahan tidak diketahui"}`,
            );
          }
        } catch (error) {
          console.error("Error updating item:", error);
          showErrorNotification(`❌ Terjadi kesalahan saat update item`);
        }
      }

      // ============= PREVIEW & PRINT FUNCTIONS =============
      function previewStruk() {
        let grandTotal = 0;
        let strukHTML = "";
        let hasItems = false;

        items.forEach((item) => {
          const qty = itemQty[item.id] || 0;
          if (qty > 0) {
            hasItems = true;
            const totalPrice = qty * item.price;
            grandTotal += totalPrice;

            strukHTML += `
              <div class="struk-preview-item">
                <span class="struk-preview-item-name">${item.name}</span>
                <span class="struk-preview-item-qty">${qty}x</span>
                <span class="struk-preview-item-price">Rp${formatRupiah(totalPrice)}</span>
              </div>
            `;
          }
        });

        if (!hasItems) {
          showErrorNotification("⚠️ Tambahkan item terlebih dahulu!");
          return;
        }

        document.getElementById("preview-struk-items").innerHTML = strukHTML;
        document.getElementById("preview-struk-total").innerHTML =
          `TOTAL: Rp ${formatRupiah(grandTotal)}`;

        const now = new Date();
        const dateStr = now.toLocaleDateString("id-ID", {
          weekday: "short",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        });
        const timeStr = now.toLocaleTimeString("id-ID", {
          hour: "2-digit",
          minute: "2-digit",
        });

        document.getElementById("preview-struk-date").innerHTML = dateStr;
        document.getElementById("preview-struk-time").innerHTML = timeStr;

        document.getElementById("struk-preview-modal").style.display = "flex";
      }

      function closePreviewModal() {
        document.getElementById("struk-preview-modal").style.display = "none";
      }

      function printFromModal() {
        let grandTotal = 0;
        let strukHTML = "";

        items.forEach((item) => {
          const qty = itemQty[item.id] || 0;
          if (qty > 0) {
            const totalPrice = qty * item.price;
            grandTotal += totalPrice;

            strukHTML += `
              <div class="struk-item">
                <span class="struk-item-name">${item.name}</span>
                <span class="struk-item-qty">${qty}x Rp${formatRupiah(item.price)}</span>
                <span class="struk-item-price">Rp${formatRupiah(totalPrice)}</span>
              </div>
            `;
          }
        });

        document.getElementById("struk-items").innerHTML = strukHTML;
        document.getElementById("struk-total").innerHTML =
          `TOTAL: Rp ${formatRupiah(grandTotal)}`;

        const now = new Date();
        const dateStr = now.toLocaleDateString("id-ID", {
          weekday: "short",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        });
        const timeStr = now.toLocaleTimeString("id-ID", {
          hour: "2-digit",
          minute: "2-digit",
        });

        document.getElementById("struk-date").innerHTML = dateStr;
        document.getElementById("struk-time").innerHTML = timeStr;

        closePreviewModal();
        setTimeout(() => {
          window.print();
        }, 100);
      }

      // ============= INITIALIZE =============
      loadItems();
    </script>
  </body>
</html>
